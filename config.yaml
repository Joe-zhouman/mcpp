
upstreams:
  - name: test
    url: https://mcp-upstream-test.example.com/mcp
expose:
  test/search:
    upstream: test
    tool: search
    as: search_tool
    description: "Search for things. Use `test/code` for code."
    params:
      - name: query
      - name: limit
        default: 10
  test/code:
    upstream: test
    tool: code_search
    description: "Code search tool."
