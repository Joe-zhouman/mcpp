<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mcpp &mdash; Admin</title>
<style>
  body { font-family: system-ui; max-width: 960px; margin: 0 auto; padding: 1rem; }
  table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
  th, td { text-align: left; padding: .5rem; border-bottom: 1px solid #ddd; }
  th { background: #f5f5f5; }
  textarea { width: 100%; min-height: 400px; font-family: monospace; }
  button { padding: .5rem 1rem; margin: .5rem .5rem 0 0; cursor: pointer; }
  .tabs { margin-bottom: 1rem; }
  .tab { display: inline-block; padding: .5rem 1rem; cursor: pointer; border: 1px solid #ddd; }
  .tab.active { background: #f0f0f0; }
  .panel { display: none; }
  .panel.active { display: block; }
  #config-status { margin-top: .5rem; }
</style>
</head>
<body>
<h1>mcpp Admin</h1>

<div class="tabs">
  <span class="tab active" data-tab="preview">Tool Preview</span>
  <span class="tab" data-tab="config">Config Editor</span>
</div>

<div id="preview" class="panel active">
  <button onclick="loadPreview()">Refresh</button>
  <table><thead><tr><th>Name</th><th>Description</th><th>Params</th></tr></thead><tbody></tbody></table>
</div>

<div id="config" class="panel">
  <textarea id="config-text"></textarea>
  <button onclick="loadConfig()">Load</button>
  <button onclick="saveConfig()">Save &amp; Reload</button>
  <div id="config-status"></div>
</div>

<script>
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab, .panel').forEach(e => e.classList.toggle('active', false));
    t.classList.add('active');
    document.getElementById(t.dataset.tab).classList.add('active');
  };
});

async function loadPreview() {
  const res = await fetch('/api/tools');
  const tools = await res.json();
  document.querySelector('tbody').innerHTML = tools.map(t =>
    `<tr><td><code>${t.name}</code></td><td>${t.description || ''}</td><td><pre>${JSON.stringify(t.inputSchema, null, 2)}</pre></td></tr>`
  ).join('');
}

async function loadConfig() {
  const res = await fetch('/api/config');
  const data = await res.json();
  document.getElementById('config-text').value = data.yaml;
}

async function saveConfig() {
  const text = document.getElementById('config-text').value;
  const res = await fetch('/api/config', { method: 'POST', body: text });
  const stat = document.getElementById('config-status');
  if (res.ok) {
    stat.textContent = 'Saved & reloaded ✓';
    stat.style.color = 'green';
    loadPreview();
  } else {
    stat.textContent = 'Error: ' + (await res.text());
    stat.style.color = 'red';
  }
}

loadPreview();
</script>
</body>
</html>
